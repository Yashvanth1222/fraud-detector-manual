services:
  - type: web
    name: fraud-detector-manual
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FRAUD_SHEET_ID
        sync: false
      - key: ANALYZED_SHEET_ID
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: SCORE_THRESHOLD
        sync: false
